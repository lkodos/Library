<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Person</title>
</head>
<body>

<div th:text="${person.name + ', ' + person.year}"></div>
<hr/>

<h3>Книги:</h3>
<div th:each="book : ${books}">
    <p th:text="${book.title + ', ' + book.author + ', ' + book.year}"></p>
</div>
<div th:if="${books.isEmpty()}">
    <p>У читателя пока нет ни одной книги</p>
</div>
<hr/>

<form th:method="GET" th:action="@{/people/edit/{id}(id=${person.id})}">
    <input type="submit" value="Редактировать читателя">
</form>
<br/>

<form th:method="DELETE" th:action="@{/people/{id}(id=${person.id})}">
    <input type="submit" value="Удалить читателя">
</form>

</body>
</html>
