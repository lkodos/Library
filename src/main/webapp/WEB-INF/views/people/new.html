<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add reader</title>
</head>
<body>

<h2>Add new reader</h2>
<hr/>

<form th:method="POST" th:action="@{/people}" th:object="${person}">
    <label for="name">Name:</label>
    <input id="name" type="text" th:field="*{name}"/>
    <div style="color: red" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    <br/>
    <br/>

    <label for="year">Year of birth:</label>
    <input id="year" type="text" th:field="*{year}"/>
    <div style="color: red" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
    <br/>
    <br/>

    <input type="submit" value="Add reader" />
</form>

</body>
</html>
