<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Readers</title>
</head>
<body>

<h2>All library readers:</h2>
<hr>

<div th:each="person : ${people}">
    <a th:href="@{/people/{id}(id=${person.id})}"
       th:text="${person.name + ', ' + person.year}"></a>
</div>
<hr>
<a th:href="@{/people/new}">Добавить читателя</a>

</body>
</html>
