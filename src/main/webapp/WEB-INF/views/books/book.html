<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit book</title>
</head>
<body>

<div th:text="${book.title + ', ' + book.author + ', ' + book.year}"></div>
<hr/>

<div th:if="${person == null}">
    <p>Эта книга свободна</p>
    <form th:method="POST" th:action="@{'/books/' + ${book.id} + '/issue'}">
        <label for="person">Кому назначить:</label>
        <select id="person" th:object="${newPerson}" th:field="*{id}">
            <option th:each="person : ${people}" th:value="${person.id}" th:text="${person.name}"></option>
        </select>

        <input type="submit" value="Выдать книгу">
    </form>
    
</div>

<div th:if="${person != null}">
    <p>Книга сейчас находится: <span th:text="${person.name}"></span> </p>
    <form th:method="PATCH"
          th:action="@{/books/{id}(id=${book.id}) }"
          th:object="${book}">
        <input type="submit" value="Освободить книгу"/>
    </form>
</div>
<hr/>

<form th:method="GET" th:action="@{/books/edit/{id}(id=${book.id})}">
    <input type="submit" value="Редактировать">
</form>
<br/>

<form th:method="DELETE" th:action="@{/books/{id}(id=${book.id})}">
    <input type="submit" value="Удалить книгу">
</form>

</body>
</html>
